<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 174 166" role="img" aria-label="Decorative square button shell">
  <defs>
    <pattern id="tile-dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#F44407" />
    </pattern>
    <pattern id="tile-fine-dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.25" fill="#FBA934" />
    </pattern>
    <filter id="paper-noise" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16" />
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply" />
    </filter>
    <clipPath id="tile-face-clip">
      <polygon points="31 27 153 24 153 137 29 139" />
    </clipPath>
  </defs>

  <polygon points="31 4 161 30 141 156 15 137" fill="#FFF783" />
  <polygon points="16 16 158 7 163 149 19 157" fill="#31F5D3" opacity="0.88" />
  <polygon points="20 22 164 15 164 149 24 154" fill="#F44407" />
  <polygon points="26 28 157 25 157 142 27 146" fill="#FFF3DF" />

  <g clip-path="url(#tile-face-clip)">
    <rect x="24" y="24" width="134" height="120" fill="#FFF3DF" filter="url(#paper-noise)" />
    <path d="M25 48 L157 41 L157 62 L25 68 Z" fill="#FFF3B6" opacity="0.82" />
    <path d="M25 83 L157 76 L157 96 L25 104 Z" fill="#FDE3A4" opacity="0.72" />
    <path d="M25 118 L157 112 L157 134 L25 140 Z" fill="#FFE87B" opacity="0.42" />
    <rect x="23" y="23" width="53" height="42" fill="url(#tile-dots)" opacity="0.82" />
    <rect x="113" y="28" width="48" height="58" fill="url(#tile-fine-dots)" opacity="0.5" transform="skewY(-9)" />
    <path d="M29 140 L87 131 L154 140 L154 147 L29 147 Z" fill="#FBA934" opacity="0.28" />
  </g>

  <path d="M19 22 L164 15 L164 149 L24 154 Z" fill="none" stroke="#FF7433" stroke-width="7" stroke-linejoin="miter" />
  <path d="M29 29 L155 25 L155 141 L28 145 Z" fill="none" stroke="#FFF783" stroke-width="5" stroke-linejoin="miter" />
  <path d="M30 28 L154 25 L154 140 L29 143 Z" fill="none" stroke="#F44407" stroke-width="4" stroke-linejoin="miter" />
  <path d="M18 18 L5 25 L17 37" fill="#FFF783" />
  <path d="M158 13 L171 6 L164 24" fill="#31F5D3" />
  <path d="M18 150 L5 142 L21 132" fill="#FFF783" opacity="0.9" />
  <path d="M161 145 L170 157 L151 153" fill="#31F5D3" opacity="0.75" />
</svg>
