<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zerowax Display Preview</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Bungee&display=swap");

      @font-face {
        font-family: "Zerowax";
        src: url("../fonts/Zerowax.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      :root {
        color-scheme: dark;
        --black: #000;
        --cream: #fff3df;
        --red: #f20222;
        --orange: #ff7433;
        --yellow: #fba934;
        --cyan: #31f5d3;
        --mint: #61efaf;
        --purple: #65005e;
        --font-special: "Zerowax", "Bungee", Impact, fantasy;
        --font-body: "Barlow", ui-sans-serif, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--black);
        color: var(--cream);
        font-family: var(--font-body);
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0;
        display: grid;
        gap: 28px;
      }

      .specimen {
        min-height: 56vh;
        display: grid;
        align-content: center;
        gap: 22px;
        border: 1px solid rgb(255 255 255 / 0.14);
        padding: clamp(20px, 6vw, 56px);
        background:
          linear-gradient(135deg, rgb(49 245 211 / 0.12), transparent 34%),
          linear-gradient(315deg, rgb(242 2 34 / 0.18), transparent 32%),
          #030303;
        overflow: hidden;
      }

      .display {
        margin: 0;
        font-family: var(--font-special);
        font-size: clamp(4.6rem, 18vw, 14rem);
        line-height: 0.82;
        letter-spacing: 0;
        color: var(--orange);
        paint-order: stroke fill;
        -webkit-text-stroke: 2px var(--black);
        text-shadow:
          4px 4px 0 var(--yellow),
          8px 8px 0 var(--cyan),
          12px 12px 0 rgb(101 0 94 / 0.78);
      }

      .sample-row {
        display: grid;
        gap: 12px;
      }

      .label {
        color: rgb(255 243 223 / 0.68);
        font-size: 0.84rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .alphabet {
        font-family: var(--font-special);
        font-size: clamp(2.5rem, 7vw, 5rem);
        line-height: 1;
        color: var(--cyan);
        overflow-wrap: anywhere;
      }

      .note {
        margin: 0;
        max-width: 72ch;
        color: rgb(255 243 223 / 0.72);
        font-size: 0.96rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="specimen" aria-label="Zerowax display specimen">
        <h1 class="display" contenteditable="true" spellcheck="false">STELLARTIDE</h1>
        <div class="sample-row">
          <span class="label">Alphabet</span>
          <div class="alphabet" contenteditable="true" spellcheck="false">
            ABCDEFGHIJKLMNOPQRSTUVWXYZ 0123456789
          </div>
        </div>
      </section>
      <p class="note">
        Zerowax is a local/licensed special-display candidate. Without the local font file,
        this preview falls back to Bungee for the public design-system build.
      </p>
    </main>
  </body>
</html>
